name: Daily Property Scraper

on:
  schedule:
    - cron: '0 5 * * *'  # 9am Dubai time (UTC+4) every day
  workflow_dispatch:       # also lets you trigger it manually with a button

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run scraper
        run: python scrape.py

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html listings.json
          git diff --staged --quiet || git commit -m "Daily scrape $(date +'%Y-%m-%d')"
          git push
