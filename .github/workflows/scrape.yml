name: Daily Property Scraper

on:
  schedule:
    - cron: '0 5 * * *'  # 9am Dubai time (UTC+4) every day
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python scrape.py

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html listings.json
          git diff --staged --quiet || git commit -m "Daily scrape $(date +'%Y-%m-%d')"
          git push
